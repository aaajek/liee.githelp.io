<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINEで友達追加</title>
    <style>
        /* 全局布局 */
        body {
            font-family: "Arial", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;

            /* 可选背景图片 */
            background-image: url('https://www.example.com/your-background.jpg'); /* 替换你的背景图 */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: #fff; /* 改成白色，更适合深色背景 */
            text-align: center;
        }

        /* 标题 */
        h1 {
            color: #ff6f61;
            margin-bottom: 15px;
            font-size: 6vw; /* 自适应手机 */
            text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
        }

        /* 段落文字 */
        p {
            font-size: 4.5vw; /* 自适应手机 */
            margin-bottom: 15px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
        }

        /* 按钮 */
        a.button {
            display: inline-block;
            padding: 4vw 8vw; /* 自适应按钮大小 */
            font-size: 5vw;
            color: #fff;
            background-color: #00c300;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 20px;
        }

        /* 二维码图片 */
        img.qr {
            width: 40vw;  /* 自适应屏幕 */
            max-width: 200px; /* 最大宽度 */
            height: auto;
            border-radius: 12px;
            border: 2px solid #fff;
            margin-bottom: 20px;
        }

        /* 小文字 */
        small {
            display: block;
            margin-top: 20px;
            color: #ddd;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            font-size: 3vw;
        }

        /* 适配超小屏幕 */
        @media (max-width: 350px) {
            a.button {
                padding: 5vw 10vw;
                font-size: 6vw;
            }
        }
    </style>
</head>
<body>
    <h1>💕セックスの刺激感とその過程が超楽しいんだ！💕</h1>

    <p>💌→秘密のお部屋からしてください</p>
    <p>35歳以上の方だけを好みます。</p>
    <p>👇私の秘密のお部屋です👇</p>

    <!-- LINE按钮 -->
    <a class="button" href="https://line.me/ti/p/Va48RgKxYV" target="_blank">LINEで追加する</a>

    <!-- 二维码 -->
    <img class="qr" src="photo_2026-03-18_21-28-30.jpg" alt="LINE QRコード">

    <small>このリンクを共有して、簡単に友達追加できます</small>
</body>
</html>
